# pi-route example config.
#
# Operational settings (port, host, tokens, paths) live in env vars:
#   PI_ROUTE_PORT    listen port            (default 3000)
#   PI_ROUTE_HOST    listen host            (default 127.0.0.1)
#   PI_ROUTE_TOKEN   comma-separated client bearer tokens; unset = no gate
#   PI_ROUTE_CONFIG  path to this file      (default ~/.config/pi-route/config.yaml)
#   PI_ROUTE_AUTH    OAuth + state.json dir (default ~/.local/share/pi-route/auth)

# Atomic upstream connections. One provider = one account.
providers:
  claude-max:
    type: anthropic
    account: your-email@example.com   # run: pi-route provider claude-max auth anthropic

  antigravity:
    type: antigravity
    account: user@gmail.com

  # A key-credential provider. `apiKey` is first-class — a literal, or a $VAR
  # read from the environment. Register it without hand-editing via:
  #   pi-route provider chutes set --url https://llm.chutes.ai/v1 --key-env CHUTES_API_KEY
  # chutes:
  #   type: openai-compatible
  #   baseUrl: https://llm.chutes.ai/v1
  #   apiKey: $CHUTES_API_KEY

# Routing pipeline. Each entry's YAML value shape declares its semantics:
#   key: target           → alias (rewrite bare name to target)
#   key: [m1, m2, ...]    → pool (balance across members; default round-robin)
#   key: {to, strategy?, when?}  → full entry
pipeline:
  # Aliases — convenient short names for common Claude models.
  opus:    claude-max/claude-opus-4-7
  sonnet:  claude-max/claude-sonnet-4-6
  haiku:   claude-max/claude-haiku-4-5

# Public-surface filter for /v1/models. Empty / omitted = all reachable.
# Use gitignore-style patterns:
#   `claude-max/**`          — allow everything under that prefix
#   `!**/claude-3-*`         — exclude (after allow)
expose: []
